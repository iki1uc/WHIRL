<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ID · SQRT‑API‑NC²□ Router · EXTENDED</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#6cf; margin-bottom:30px; }
.block { background:#111; border:1px solid #333; padding:25px; margin-bottom:30px; border-radius:8px; }
.title { font-size:22px; color:#6cf; margin-bottom:10px; }
a { color:#6cf; text-decoration:none; font-weight:bold; display:block; margin:6px 0; }
pre { background:#000; border-left:3px solid #6cf; padding:15px; white-space:pre-wrap; }
</style>

<!-- SYSTEM MODULES -->
<script src="API/API.system.js"></script>
<script src="API/API.ghost.js"></script>
<script src="NC²□.sync"></script>
<script src="SQRT/sqrt.room"></script>
<script src="API/API.room"></script>
<script src="API/API.raw"></script>
<script src="API/API-6E→6D.tech-Engine.html"></script>

</head>

<body>

<h1>ID · SQRT‑API‑NC²□ Router · EXTENDED</h1>

<div class="block">
    <div class="title">System‑Status</div>
    <pre id="sys"></pre>
</div>

<script>
(async function () {

    const files = [
        "SQRT/sqrt.room",
        "API/API.room",
        "API/API.raw",
        "API/API‑Fusion‑Matrix.html",
        "API/API‑Meta‑Drift‑Monitor6D.html",
        "API/API‑NC²□.sync‑Visualizer.html",
        "API/API‑6E→6D.tech‑Engine.html",
        "NC²□.sync",
        "Visualizer.html",
        "Meta‑Drift.html",
        "T.room",
        "h.room"
    ];

    let status = "=== FILE CHECK ===\n";

    for (const f of files) {
        const ok = await fetch(f).then(r => r.ok).catch(() => false);
        status += `${f} → ${ok ? "OK" : "FEHLT"}\n`;
    }

    // API-System
    const apiStatus = API.system ? "API.system.js → OK" : "API.system.js → FEHLT";

    // NC²□ Sync
    const ncStatus = typeof NC2 !== "undefined" ? "NC²□.sync → OK" : "NC²□.sync → FEHLT";

    // SQRT
    const sqrtStatus = typeof SQRT !== "undefined" ? "SQRT → OK" : "SQRT → FEHLT";

    // Ghost
    const ghostStatus = typeof GHOST !== "undefined" ? GHOST.status() : "Ghost → FEHLT";

    status += "\n=== MODULE STATUS ===\n";
    status += apiStatus + "\n";
    status += ncStatus + "\n";
    status += sqrtStatus + "\n";
    status += "Ghost → " + ghostStatus + "\n";

    document.getElementById("sys").innerText = status;

})();
</script>

</body>
</html>
