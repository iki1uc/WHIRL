<div class="block">
    <div class="title">System‑Status</div>
    <pre id="sys"></pre>
</div>

<script>
(async function () {

    const files = [
        "SQRT/sqrt.room",
        "API/API.room",
        "API/API.raw",
        "API/API‑Fusion‑Matrix.html",
        "API/API‑Meta‑Drift‑Monitor6D.html",
        "API/API‑NC²□.sync‑Visualizer.html",
        "API/API‑6E→6D.tech‑Engine.html",
        "NC²□.sync",
        "Visualizer.html",
        "Meta‑Drift.html",
        "T.room",
        "h.room"
    ];

    let status = "";

    for (const f of files) {
        const ok = await fetch(f).then(r => r.ok).catch(() => false);
        status += `${f} → ${ok ? "OK" : "FEHLT"}\n`;
    }

    document.getElementById("sys").innerText = status;

})();
</script>
