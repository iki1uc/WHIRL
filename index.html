<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>MOVE · NC · ORT · HOME · Delta · Stabil · RESPO</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#6cf; margin-bottom:30px; }
pre { background:#111; padding:20px; border-left:3px solid #6cf; white-space:pre-wrap; }
.block { background:#111; padding:20px; margin-bottom:30px; border-radius:8px; border:1px solid #333; }
.title { color:#6cf; font-size:22px; margin-bottom:10px; }
</style>

<!-- MOVE SYSTEM MODULES -->
<script src="NC.core.js"></script>
<script src="Matrix.core.js"></script>
<script src="ORT.core.js"></script>
<script src="HOME.core.js"></script>
<script src="Delta.core.js"></script>
<script src="Stabil.core.js"></script>
<script src="RESPO.core.js"></script>

</head>

<body>

<h1>MOVE · NC‑System · Lage‑Engine</h1>

<div class="block">
    <div class="title">MOVE‑Status</div>
    <pre id="moveStatus">Lade MOVE‑System…</pre>
</div>

<script>
(async function(){

    // Dateien, die move.html braucht
    const files = [
        "tmp.po.raer.tmp",
        "operator.tmp",
        "ai.farb.map.tmp",
        "golden.core.tmp",
        "ort.home.tmp",
        "home.ort.tmp"
    ];

    let status = "=== FILE CHECK ===\n";

    // Prüfen ob Dateien existieren
    for(const f of files){
        const ok = await fetch(f).then(r => r.ok).catch(() => false);
        status += `${f} → ${ok ? "OK" : "FEHLT"}\n`;
    }

    // Prüfen ob Module existieren
    status += "\n=== MODULE CHECK ===\n";

    status += typeof NC !== "undefined"     ? "NC → OK\n"     : "NC → FEHLT\n";
    status += typeof Matrix !== "undefined" ? "Matrix → OK\n" : "Matrix → FEHLT\n";
    status += typeof ORT !== "undefined"    ? "ORT → OK\n"    : "ORT → FEHLT\n";
    status += typeof HOME !== "undefined"   ? "HOME → OK\n"   : "HOME → FEHLT\n";
    status += typeof Delta !== "undefined"  ? "Delta → OK\n"  : "Delta → FEHLT\n";
    status += typeof Stabil !== "undefined" ? "Stabil → OK\n" : "Stabil → FEHLT\n";
    status += typeof RESPO !== "undefined"  ? "RESPO → OK\n"  : "RESPO → FEHLT\n";

    // Wenn alles OK ist → MOVE ausführen
    status += "\n=== MOVE EXECUTION ===\n";

    try {

        // 1. NC Kern laden
        NC.load("tmp.po.raer.tmp");
        NC.load("operator.tmp");
        NC.load("ai.farb.map.tmp");
        NC.load("golden.core.tmp");

        // 2. Lage-Module laden
        NC.load("ort.home.tmp");
        NC.load("home.ort.tmp");

        // 3. Matrix erzeugen
        Matrix.init(9, 9);

        // 4. ORT aktivieren
        ORT.scan("ort.home.tmp");

        // 5. HOME aktivieren
        HOME.center("home.ort.tmp");

        // 6. Delta berechnen
        Delta.compute(ORT.value, HOME.value);

        // 7. Stabilität berechnen
        Stabil.compute(Delta.value, HOME.phi);

        // 8. RESPO Lage ableiten
        RESPO.lage("ort.home.tmp");

        status += "MOVE → erfolgreich ausgeführt ✓\n";

    } catch(e){
        status += "MOVE → FEHLER ✗\n";
        status += e.toString() + "\n";
    }

    document.getElementById("moveStatus").innerText = status;

})();
</script>

</body>
</html>
